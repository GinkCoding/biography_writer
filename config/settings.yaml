# 传记生成器配置文件 - Kimi (优先使用)

# 模型配置
model:
  provider: openai
  api_key: ""
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  model: "qwen3.5-plus"
  max_tokens: 32768
  temperature: 0.7
  top_p: 0.9
  request_timeout_seconds: 300
  heartbeat_interval_seconds: 10

# 生成参数
generation:
  target_length: 10000
  total_chapters: 25
  sections_per_chapter: 4
  words_per_section: 500
  style: literary
  
# 路径配置
paths:
  interview_dir: ./interviews
  output_dir: ./output
  vector_db_dir: ./.vector_db
  cache_dir: ./.cache

# Embedding 配置
embedding:
  priority:
    - siliconflow
    - sentence_transformer
    - openai
    - tfidf
  
  siliconflow:
    api_key: ""
    model: "BAAI/bge-m3"
